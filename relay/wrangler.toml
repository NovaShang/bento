name = "bento-relay"
main = "src/worker.ts"
compatibility_date = "2025-01-15"

# Durable Object: one instance per daemon_id. Holds the pairing slot and
# bridges the daemon WSS to each iOS WSS connection.
[[durable_objects.bindings]]
name = "DAEMON_DO"
class_name = "DaemonDO"

[[migrations]]
tag = "v1"
new_classes = ["DaemonDO"]

# Per-IP rate limits. Limits are evaluated per Cloudflare PoP — sufficient
# for stopping the bottom 99% of abuse; brute-force the rest at the DO layer.
# Period must be 60 or 10. Namespace ids are arbitrary but unique per account.
[[unsafe.bindings]]
name = "RL_REGISTER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 30, period = 60 }

[[unsafe.bindings]]
name = "RL_PAIR"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 60, period = 60 }

# ASR token mint. Caps requests-per-IP-per-minute so a leaked shared
# secret can't burn unlimited OpenAI quota before being rotated.
[[unsafe.bindings]]
name = "RL_MINT"
type = "ratelimit"
namespace_id = "1003"
simple = { limit = 20, period = 60 }

# Batch transcription proxy (right-swipe preview flow). Full-utterance audio +
# gpt-4o-transcribe, so capped per IP; each call is a real transcription.
[[unsafe.bindings]]
name = "RL_TRANSCRIBE"
type = "ratelimit"
namespace_id = "1004"
simple = { limit = 20, period = 60 }

[observability]
enabled = true
