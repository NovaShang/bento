			shellScript = "set -e\n# Xcode's PATH is minimal; add Homebrew so `go` and `make` resolve.\nexport PATH=\"/opt/homebrew/bin:/usr/local/bin:$PATH\"\n( cd \"$SRCROOT/desktop\" && make build )\n# APFS is case-insensitive, so the Swift `Bento` executable would\n# collide with the Go `bento` CLI in Contents/MacOS. Put helpers in\n# a sibling `helpers/` subdir so each binary has a distinct path.\nDEST=\"$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH/helpers\"\nmkdir -p \"$DEST\"\ncp -f \"$SRCROOT/desktop/bin/bento\"        \"$DEST/\"\ncp -f \"$SRCROOT/desktop/bin/bento-daemon\" \"$DEST/\"\n# Bundle tmux so tmux -CC (the tiled multi-pane sessions) works on\n# Macs with no system tmux. TmuxResolver already looks here first,\n# and LocalPty appends helpers/ to the login-shell PATH so a bare\n# `tmux` resolves to this too. `make build` runs fetch-bundled-tmux\n# above, so the slot binary is present. A user's own tmux still wins.\nslot=\"darwin-$(uname -m)\"   # arm64 host -> tmux-darwin-arm64\nif [ -f \"$SRCROOT/desktop/bin/bundled/tmux-$slot\" ]; then\n  cp -f \"$SRCROOT/desktop/bin/bundled/tmux-$slot\" \"$DEST/tmux\"\n  chmod +x \"$DEST/tmux\"\nelse\n  echo \"warning: no bundled tmux for $slot; app will need a system tmux\" >&2\nfi\n";
