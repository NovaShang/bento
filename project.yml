name: Bento
options:
  bundleIdPrefix: com.bento
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "26.4"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: 7M23245ZBD

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.7.0"
  SwiftTmux:
    path: swift-tmux

targets:
  Bento:
    type: application
    platform: iOS
    sources:
      - Bento/Sources
    resources:
      - Bento/Resources
    dependencies:
      - package: SwiftTerm
      - package: Citadel
      - package: SwiftTmux
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Bento needs microphone access for voice input to terminal."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Bento uses speech recognition to convert voice to text and shell commands."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Bento uses Face ID to protect your SSH keys."
        INFOPLIST_KEY_NSCameraUsageDescription: "Bento uses the camera to scan the pairing QR code shown by your Mac."
        ITSAppUsesNonExemptEncryption: false
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: Bento/Info.plist
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.bento.app

  BentoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BentoTests/Sources
    dependencies:
      - target: Bento
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true

  BentoMenubar:
    type: application
    platform: macOS
    sources:
      - BentoMenubar/Sources
      - BentoMenubar/Resources/Assets.xcassets
    settings:
      base:
        # User-facing product name is just "Bento" (matching the iOS app);
        # the internal target name stays BentoMenubar to avoid Xcode-level
        # collision with the iOS Bento target.
        PRODUCT_NAME: Bento
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true       # menubar-only, no Dock icon
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleDisplayName: "Bento"
        PRODUCT_BUNDLE_IDENTIFIER: com.bento.menubar
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: BentoMenubar/Resources/BentoMenubar.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    postCompileScripts:
      - name: "Embed Go binaries (bento + bento-daemon)"
        script: |
          set -e
          # Xcode's PATH is minimal; add Homebrew so `go` and `make` resolve.
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          ( cd "$SRCROOT/desktop" && make build )
          # APFS is case-insensitive, so the Swift `Bento` executable would
          # collide with the Go `bento` CLI in Contents/MacOS. Put helpers in
          # a sibling `helpers/` subdir so each binary has a distinct path.
          DEST="$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH/helpers"
          mkdir -p "$DEST"
          cp -f "$SRCROOT/desktop/bin/bento"        "$DEST/"
          cp -f "$SRCROOT/desktop/bin/bento-daemon" "$DEST/"
