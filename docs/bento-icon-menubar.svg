<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    菜单栏 icon / 只剩骨架
      外框  = 864×864 圆角方 (rx=144)
      内分隔 = 横线 + 上下两段竖线 (4 格不等分)
    黑色描边,透明底,可作 macOS 模板图像 (NSImage isTemplate)
    系统会根据当前状态自动染色 (深色模式白,浅色模式黑)
  -->

  <g fill="none" stroke="#000000" stroke-width="100"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- 外框 -->
    <rect x="80" y="80" width="864" height="864" rx="144" ry="144"/>

    <!-- 横向分隔 (上 2:3 下) -->
    <line x1="80" y1="432" x2="944" y2="432"/>

    <!-- 上半竖向分隔 (左 2:3 右) -->
    <line x1="424" y1="80" x2="424" y2="432"/>

    <!-- 下半竖向分隔 (向左挪以补偿更粗的描边) -->
    <line x1="720" y1="432" x2="720" y2="944"/>
  </g>
</svg>
