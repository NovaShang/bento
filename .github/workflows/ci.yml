# Daily CI for the Bento daemon + CLI. Runs on every push and PR.
#
# Critically, this workflow NEVER compiles tmux from source — it fetches the
# prebuilt binary from the release tag pinned in scripts/bundled-tmux.version.
# Building tmux + libevent takes several minutes; pulling a binary takes
# seconds. The build-bundled-tmux.yml workflow is what produces those
# binaries when the version pin changes.
#
# The fetch step is wrapped so a missing release (e.g. immediately after a
# version bump, before the release workflow has finished) doesn't break CI:
# the runtime resolver falls back to system tmux, and CI only needs to verify
# that the resolver itself + the surrounding code works.

name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  desktop:
    name: desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # macOS is where most contributors develop; Linux catches portability
        # regressions in the daemon (it'll be the dominant production host).
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: desktop/go.sum

      # Cache the prebuilt tmux across runs so we don't hit the GH API for
      # every CI invocation. Keyed on the version file so a pin bump
      # invalidates automatically.
      - name: Cache bundled tmux
        uses: actions/cache@v4
        with:
          path: desktop/bin/bundled
          key: bundled-tmux-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/bundled-tmux.version') }}

      - name: Fetch bundled tmux
        # GITHUB_TOKEN gives `gh release download` access without an extra login.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/fetch-bundled-tmux.sh

      - name: vet + test + build
        working-directory: desktop
        run: make ci

  # macOS-only Xcode build for the menubar app. Kept separate so a broken
  # Xcode setup doesn't gate Go tests on Linux.
  menubar:
    name: menubar app (xcodebuild)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: desktop/go.sum

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Cache bundled tmux
        uses: actions/cache@v4
        with:
          path: desktop/bin/bundled
          key: bundled-tmux-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/bundled-tmux.version') }}

      - name: Fetch bundled tmux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/fetch-bundled-tmux.sh

      - name: Generate Xcode project
        run: xcodegen

      # Unsigned build — we're verifying compilation, not producing a
      # signed artifact. Code-signing happens in the release workflow.
      - name: xcodebuild BentoMenubar
        run: |
          xcodebuild -project Bento.xcodeproj \
            -target BentoMenubar -configuration Debug -sdk macosx \
            CODE_SIGNING_ALLOWED=NO build
