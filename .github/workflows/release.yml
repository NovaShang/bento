# Tag-triggered release: cross-compile bento-daemon + bento CLI for each
# supported (os, arch) slot, build the Mac menubar app (arm64-only), and
# upload everything as assets on a GitHub release tagged from the workflow
# trigger.
#
# Triggers
#   - push of a tag matching v* (e.g. v0.1.0). CI cuts a release immediately.
#   - workflow_dispatch: manual button, takes a `tag` input. Useful for
#     re-running a single failed slot — the publish step uses --clobber.
#
# Layout of release assets
#   bento-darwin-arm64.tar.gz   daemon + cli + bundled tmux for Apple Silicon
#   bento-linux-x86_64.tar.gz   same shape for Linux amd64
#   bento-linux-arm64.tar.gz    same shape for Linux arm64
#   Bento-macos-arm64.zip       the menubar app (unsigned for now)
#   *.sha256                    side-car checksum for each archive
#
# Intel Mac is intentionally omitted: GH-hosted Intel runners are queue-
# starved post-deprecation and Intel-Mac users currently aren't a target.
# The CLI is platform-agnostic in source — anyone can `go build` locally.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (must already match a pushed tag, e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # Resolves the release tag once. Push events get it from github.ref_name;
  # workflow_dispatch reads the manual input.
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.t.outputs.tag }}
    steps:
      - id: t
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  # daemon + cli per (os, arch) slot, bundled with the matching prebuilt
  # tmux pulled from build-bundled-tmux's release.
  desktop:
    needs: resolve-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            slot: darwin-arm64
            goos: darwin
            goarch: arm64
          - os: ubuntu-22.04
            slot: linux-x86_64
            goos: linux
            goarch: amd64
          - os: ubuntu-22.04-arm
            slot: linux-arm64
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: desktop/go.sum

      # Pull the matching bundled tmux from build-bundled-tmux's release.
      # Missing is non-fatal (resolver falls back to system tmux), so we
      # don't gate the release on it.
      - name: Fetch bundled tmux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/fetch-bundled-tmux.sh || true

      - name: Build daemon + cli
        working-directory: desktop
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags='-s -w -X main.version=${{ needs.resolve-tag.outputs.tag }}' \
            -o bin/bento-daemon ./cmd/bento-daemon
          go build -ldflags='-s -w -X main.version=${{ needs.resolve-tag.outputs.tag }}' \
            -o bin/bento ./cmd/bento

      - name: Package
        run: |
          set -e
          slot="${{ matrix.slot }}"
          stage=$(mktemp -d)
          # Flat layout so install.sh + brew can drop straight into PATH.
          cp desktop/bin/bento-daemon "$stage/bento-daemon"
          cp desktop/bin/bento        "$stage/bento"
          if [ -f "desktop/bin/bundled/tmux-$slot" ]; then
            cp "desktop/bin/bundled/tmux-$slot" "$stage/bento-tmux"
            chmod +x "$stage/bento-tmux"
          fi
          mkdir -p artifacts
          tar -C "$stage" -czf "artifacts/bento-$slot.tar.gz" .
          (cd artifacts && shasum -a 256 "bento-$slot.tar.gz" > "bento-$slot.tar.gz.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.slot }}
          path: artifacts/*
          if-no-files-found: error

  # arm64-only Mac menubar app. Currently unsigned — first-launch on a
  # foreign Mac shows the Gatekeeper warning until D (notarize) lands.
  menubar:
    needs: resolve-tag
    # macos-15 has Xcode 16.x; macos-14's Xcode 15.x can't read the
    # objectVersion 77 (Xcode 26) format that project.yml emits by default.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: desktop/go.sum

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Fetch bundled tmux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/fetch-bundled-tmux.sh || true

      # Pin the generated pbxproj to the format the runner's Xcode 16.x
      # can read. Local dev keeps project.yml's xcodeVersion at 26.4 so
      # Xcode 26 features still work in-IDE; CI just rewrites the spec
      # before running xcodegen.
      - name: Generate Xcode project (CI-compatible format)
        run: |
          sed -i.bak 's/^  xcodeVersion: .*/  xcodeVersion: "16.0"/' project.yml
          xcodegen
          mv project.yml.bak project.yml

      # ---- code signing setup -------------------------------------------
      # Decrypt the MACOS_CERT_P12_BASE64 secret into a fresh, password-
      # protected temporary keychain. The keychain is throwaway: the runner
      # is ephemeral and we delete it at the end of the job anyway.
      - name: Set up signing keychain
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD:   ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -e
          KEYCHAIN_PATH="${RUNNER_TEMP}/bento-signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 24)"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASS=${KEYCHAIN_PASS}" >> "$GITHUB_ENV"

          P12="${RUNNER_TEMP}/cert.p12"
          echo "${MACOS_CERT_P12_BASE64}" | base64 --decode > "${P12}"

          security create-keychain -p "${KEYCHAIN_PASS}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASS}" "${KEYCHAIN_PATH}"
          # Apple Keychain exports use RC2-40-CBC which OpenSSL 3 rejects,
          # but `security import` still understands it.
          security import "${P12}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${MACOS_CERT_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          # Grant codesign access to the imported key without a UI prompt.
          security set-key-partition-list \
            -S "apple-tool:,apple:,codesign:" \
            -s -k "${KEYCHAIN_PASS}" "${KEYCHAIN_PATH}" >/dev/null
          # Prepend to search list so codesign + xcodebuild find our cert.
          security list-keychains -d user -s \
            "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')
          rm "${P12}"

      - name: Resolve signing identity
        run: |
          identity="$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" \
            | grep 'Developer ID Application' | head -1 | sed -E 's/.* "([^"]+)".*/\1/')"
          if [ -z "$identity" ]; then
            security find-identity -v -p codesigning "${KEYCHAIN_PATH}" >&2
            echo "ERROR: no Developer ID Application identity in keychain" >&2
            exit 1
          fi
          echo "SIGN_IDENTITY=${identity}" >> "$GITHUB_ENV"
          echo "Signing as: ${identity}"

      # ---- build --------------------------------------------------------
      - name: Build Bento.app (Release, signed)
        # postCompileScript copies the Go binaries + bundled tmux into
        # Bento.app/Contents/MacOS/helpers. xcodebuild signs the Swift
        # bundle; we sign the helpers explicitly in the next step before
        # re-sealing the outer bundle.
        run: |
          xcodebuild -project Bento.xcodeproj \
            -scheme BentoMenubar \
            -configuration Release \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO ARCHS=arm64 \
            DEVELOPMENT_TEAM="${{ secrets.MACOS_TEAM_ID }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${SIGN_IDENTITY}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${KEYCHAIN_PATH}" \
            build

      - name: Sign embedded helpers + re-seal bundle
        run: |
          set -e
          app="build/Build/Products/Release/Bento.app"
          # Inner first: each Go binary + bundled tmux. Hardened runtime is
          # required for notarization; --timestamp pins a secure timestamp
          # which is what staples to.
          for f in "$app/Contents/MacOS/helpers/"*; do
            [ -f "$f" ] || continue
            codesign --force --options=runtime --timestamp \
              --keychain "${KEYCHAIN_PATH}" \
              --sign "${SIGN_IDENTITY}" \
              "$f"
          done
          # Re-sign the app so its seal covers the freshly-signed helpers.
          codesign --force --options=runtime --timestamp \
            --keychain "${KEYCHAIN_PATH}" \
            --sign "${SIGN_IDENTITY}" \
            --entitlements BentoMenubar/Resources/BentoMenubar.entitlements \
            "$app"
          # Sanity check: codesign --verify exits non-zero if anything is
          # mis-signed, mis-sealed, or has a broken nested signature.
          codesign --verify --deep --strict --verbose=2 "$app"

      # ---- notarize (best effort) --------------------------------------
      # Apple's notary service routinely finishes in 5-15 minutes but can
      # spike >45m during peak hours, and there is nothing we can do
      # client-side to speed it up. Treating notarization as a hard
      # requirement blocks the entire release on Apple's queue depth.
      # We run it best-effort: the .app is always Developer-ID-signed
      # and installable; users get the right-click-Open prompt on first
      # launch when we couldn't get a staple ticket in time.
      - name: Notarize (best effort)
        id: notarize
        continue-on-error: true
        env:
          NOTARY_KEY_ID:    ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          NOTARY_KEY_P8:    ${{ secrets.APPLE_NOTARY_KEY_P8 }}
        run: |
          set -e
          app="build/Build/Products/Release/Bento.app"
          submit_zip="${RUNNER_TEMP}/Bento-notary.zip"
          p8="${RUNNER_TEMP}/AuthKey.p8"
          printf '%s' "${NOTARY_KEY_P8}" > "${p8}"

          # notarytool needs the .app inside a zip (or .dmg / .pkg). This
          # is *not* the artifact users download — that gets re-zipped
          # after the staple ticket is attached.
          ditto -c -k --sequesterRsrc --keepParent "$app" "${submit_zip}"

          xcrun notarytool submit "${submit_zip}" \
            --key      "${p8}" \
            --key-id   "${NOTARY_KEY_ID}" \
            --issuer   "${NOTARY_ISSUER_ID}" \
            --wait \
            --timeout  60m

          rm "${p8}"

      # Stapler only runs when notary actually completed (not on the
      # continue-on-error skip path). The released zip is signed either
      # way; staple is the difference between "no Gatekeeper prompt" and
      # "user has to right-click → Open the first time".
      - name: Staple notary ticket
        if: steps.notarize.outcome == 'success'
        run: |
          set -e
          app="build/Build/Products/Release/Bento.app"
          xcrun stapler staple "$app"
          xcrun stapler validate "$app"

      - name: Note un-notarized release
        if: steps.notarize.outcome != 'success'
        run: |
          echo "::warning::Notarization did not complete in 60m — release ships signed but not stapled. Users right-click → Open on first launch."

      # ---- package -------------------------------------------------------
      - name: Package
        run: |
          set -e
          app="build/Build/Products/Release/Bento.app"
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "$app" artifacts/Bento-macos-arm64.zip
          (cd artifacts && shasum -a 256 Bento-macos-arm64.zip > Bento-macos-arm64.zip.sha256)

      - name: Tear down signing keychain
        if: always()
        run: |
          security delete-keychain "${KEYCHAIN_PATH}" 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: menubar
          path: artifacts/*
          if-no-files-found: error

  publish:
    needs: [resolve-tag, desktop, menubar]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag="${{ needs.resolve-tag.outputs.tag }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes
          fi
          gh release upload "$tag" artifacts/* --clobber

  # Rewrite Formula/bento.rb with the new version + sha256 of each
  # released tarball, then push a commit back to main. Brew users get the
  # updated formula on `brew update` without anyone touching the file by
  # hand. Pushing a tag is the only way to trigger this; pre-release
  # branches don't touch the formula.
  update-formula:
    needs: [resolve-tag, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Rewrite Formula/bento.rb
        run: |
          set -e
          tag="${{ needs.resolve-tag.outputs.tag }}"
          version="${tag#v}"

          sha_darwin_arm64="$(awk '{print $1}' < artifacts/bento-darwin-arm64.tar.gz.sha256)"
          sha_linux_x86_64="$(awk '{print $1}' < artifacts/bento-linux-x86_64.tar.gz.sha256)"
          sha_linux_arm64="$(awk '{print $1}'  < artifacts/bento-linux-arm64.tar.gz.sha256)"

          formula=Formula/bento.rb
          # Bump the formula's version line.
          sed -i -E "s/^  version \"[^\"]+\"/  version \"$version\"/" "$formula"
          # Bump every release-tarball URL to the new tag.
          sed -i -E "s|releases/download/v[^/]+/bento-|releases/download/$tag/bento-|g" "$formula"

          # Rewrite each sha256. We rely on the slot-specific URL appearing
          # immediately above its sha256 line (which is how we wrote the
          # template); the awk script tracks "last URL seen" and only
          # rewrites the next sha256 once.
          awk -v sd="$sha_darwin_arm64" -v lx="$sha_linux_x86_64" -v la="$sha_linux_arm64" '
            /bento-darwin-arm64\.tar\.gz"/ { next_sha = sd }
            /bento-linux-x86_64\.tar\.gz"/ { next_sha = lx }
            /bento-linux-arm64\.tar\.gz"/  { next_sha = la }
            /sha256 "/ && next_sha != "" {
              sub(/"[0-9a-f]+"/, "\"" next_sha "\"")
              next_sha = ""
            }
            { print }
          ' "$formula" > "$formula.new"
          mv "$formula.new" "$formula"

          echo "----- new $formula -----"
          cat "$formula"

      - name: Commit + push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Only commit if something actually changed (re-runs are no-ops).
          if git diff --quiet Formula/bento.rb; then
            echo "Formula already up to date, nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/bento.rb
          git commit -m "Formula/bento: bump to ${{ needs.resolve-tag.outputs.tag }}"
          git push origin main
