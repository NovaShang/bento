appId: com.speakterm.app

---

- launchApp
- assertVisible: "SpeakTerm"

# Connect
- tapOn: "mac"

- extendedWaitUntil:
    visible: "mac"
    timeout: 10000

- extendedWaitUntil:
    visible: "mac"
    timeout: 5000

- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/diag_01_single_pane

# Split
- tapOn:
    id: "rectangle.split.3x1"
- extendedWaitUntil:
    visible: "Split Horizontal"
    timeout: 3000
- tapOn: "Split Horizontal"

- extendedWaitUntil:
    visible: "mac"
    timeout: 5000

- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/diag_02_split
