appId: com.speakterm.app

---

# Test: connect, type command, split pane, verify
- launchApp
- assertVisible: "SpeakTerm"
- tapOn: "mac"

# Wait for tmux to be ready
- extendedWaitUntil:
    visible: "mac"
    timeout: 8000

# Wait extra for tmux initialization
- extendedWaitUntil:
    visible: "mac"
    timeout: 5000

- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/split_01_connected

# Type a command to verify input works
- inputText: "echo hello"

- extendedWaitUntil:
    visible: "mac"
    timeout: 2000

- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/split_02_typed

# Press Enter
- pressKey: Enter

- extendedWaitUntil:
    visible: "mac"
    timeout: 3000

- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/split_03_after_enter

# Now split horizontally
- tapOn:
    id: "rectangle.split.3x1"

- extendedWaitUntil:
    visible: "Split Horizontal"
    timeout: 3000

- tapOn: "Split Horizontal"

- extendedWaitUntil:
    visible: "mac"
    timeout: 3000

- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/split_04_split_done
