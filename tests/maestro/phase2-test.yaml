appId: com.speakterm.app

---

# Phase 2 full test: connect, verify tmux, type, split, switch panes
- launchApp
- assertVisible: "SpeakTerm"
- tapOn: "mac"

# Wait for tmux to fully initialize (connection + shell + tmux startup)
- extendedWaitUntil:
    visible: "mac"
    timeout: 10000

- extendedWaitUntil:
    visible: "mac"
    timeout: 5000

- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/p2_01_connected

# Type a command
- inputText: "echo phase2"
- pressKey: Enter

- extendedWaitUntil:
    visible: "mac"
    timeout: 3000

- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/p2_02_command_output

# Split horizontally
- tapOn:
    id: "rectangle.split.3x1"
- extendedWaitUntil:
    visible: "Split Horizontal"
    timeout: 3000
- tapOn: "Split Horizontal"

- extendedWaitUntil:
    visible: "mac"
    timeout: 3000

- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/p2_03_split

# Type in the new pane
- inputText: "whoami"
- pressKey: Enter

- extendedWaitUntil:
    visible: "mac"
    timeout: 3000

- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/p2_04_second_pane
