appId: com.bento.app

---

# Seed UserDefaults outside this flow:
#   defaults write com.bento.app pair_prefill_daemon <UUID>
#   defaults write com.bento.app pair_prefill_code   <6-digit>
- launchApp:
    clearState: false

- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"

- extendedWaitUntil:
    visible: "Bento"
    timeout: 5000

- tapOn:
    id: "plus"
- extendedWaitUntil:
    visible: "Pair Mac via relay…"
    timeout: 5000
- tapOn: "Pair Mac via relay…"

- assertVisible: "Pair Mac via Relay"
- tapOn: "Pair"

- extendedWaitUntil:
    visible: "My Computers"
    timeout: 15000
- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/relay_01_paired

- tapOn:
    below: "My Computers"

# The relay daemon goes through the same HostSessionsView as a direct host.
- extendedWaitUntil:
    visible: "New tmux session"
    timeout: 15000
- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/relay_02_session_picker

# Pick the "Connect without tmux" row to push the terminal.
- tapOn: "Connect without tmux"

# Wait for terminal to load (look for any quick-key from the accessory bar).
- extendedWaitUntil:
    visible: "esc"
    timeout: 15000
- takeScreenshot: /Users/nova/code/speakterm/tests/maestro/relay_03_terminal
