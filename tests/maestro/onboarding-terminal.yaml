appId: com.bento.app
# Terminal-stage onboarding verification (design docs/onboarding-design.md §5.4/§6):
#   1. attaching to a fresh multi-pane session shows NO sizing / focus-mode
#      dialogs (zero-modal defaults), and
#   2. the gesture overlay (hold-to-speak / double-tap) appears once.
#
# Run against the paired dev sim with the tip ledger reset first:
#   xcrun simctl spawn <sim> defaults delete com.bento.app gestureOnboardingShown_v1
# and the throwaway session recreated Mac-side WITH a split:
#   tmux kill-session -t bentotest; tmux new-session -d -s bentotest && tmux split-window -h -t bentotest
---
- runFlow: attach.yaml

# Zero-modal: the old "Window size" / "Open in Focus Mode?" dialogs must NOT
# appear on a first-ever attach to a multi-pane session.
- assertNotVisible: "Fit to my device"
- assertNotVisible: "Use Focus Mode"

# The gesture overlay teaches the two core gestures, once.
- extendedWaitUntil:
    visible: "Two gestures to rule it all"
    timeout: 10000
- assertVisible: "Hold anywhere & speak"
- assertVisible: "Double-tap anywhere"
- takeScreenshot: /tmp/onb_10_gesture_overlay
- tapOn: "Got it"

# Overlay gone; terminal + mode toggle visible.
- assertNotVisible: "Two gestures to rule it all"
- assertVisible: "Parallel"
- takeScreenshot: /tmp/onb_11_terminal_no_dialogs
