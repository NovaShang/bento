appId: com.bento.app
# Walk the first-run welcome flow (design docs/onboarding-design.md §5):
# welcome home (architecture diagram + three host paths) → Mac path steps →
# Linux/WSL path steps → "How Bento works" concept page.
#
# MUST run on a FRESH simulator/app container (the flow only shows while no
# host is paired or added). Do NOT run on the paired dev sim with clearState —
# that would wipe the user's pairing.
#
#   SIM=<fresh-udid> scripts/ios-dev.sh maestro tests/maestro/onboarding-test.yaml
---
- launchApp

# Welcome home: hero + architecture diagram + the three paths.
- extendedWaitUntil:
    visible: "I have a Mac"
    timeout: 10000
- assertVisible: "I have a Linux server / Windows (WSL)"
- assertVisible: "Connect over SSH"
- takeScreenshot: /tmp/onb_01_welcome

# Path A: Mac — three numbered steps + scan CTA.
- tapOn: "I have a Mac"
- extendedWaitUntil:
    visible: "Set up your Mac"
    timeout: 5000
- assertVisible: "bento.novashang.com/mac"
- assertVisible: "Scan the pairing code"
- takeScreenshot: /tmp/onb_02_mac_path
- tapOn: "Back"

# Path B: Linux/WSL — installer one-liner + bento pair + agent install.
- tapOn: "I have a Linux server / Windows (WSL)"
- extendedWaitUntil:
    visible: "Set up your server"
    timeout: 5000
- assertVisible: "bento pair"
- takeScreenshot: /tmp/onb_03_linux_path
- tapOn: "Back"

# Concept page: architecture + state legend + gestures.
- tapOn: "How does Bento work?"
- extendedWaitUntil:
    visible: "Your host"
    timeout: 5000
- takeScreenshot: /tmp/onb_04_how_it_works_top
- scrollUntilVisible:
    element: "Voice gestures"
    direction: DOWN
- takeScreenshot: /tmp/onb_05_how_it_works_bottom
- tapOn: "Done"

# Back on the welcome home.
- assertVisible: "I have a Mac"
